name: Tests

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install project dependencies
        run: uv sync --extra test --extra quality

      - name: Run lint (ruff)
        run: uv run ruff check .

      - name: Run type checking (mypy)
        run: uv run mypy

      - name: Run test suite with coverage threshold
        run: uv run pytest --cov=core --cov=models --cov=services --cov-report=term-missing --cov-fail-under=75
